# Deep Fund Configuration
exp_name: "dev"

# Trading settings
cashflow: 100000
tickers:
  - TSLA
  - BTC

# Workflow execution mode
sequential_mode: false # false for parallel, true for sequential execution

# Analysts to run, refer to graph.constants.py
# To enable section-aware news analysis, replace "company_news" with "section_news"
workflow_analysts:
  #- dummy
  - technical
  - company_news
  #- section_news  # multi-section news analyst (replaces company_news)

# LLM model settings, refer to llm/inference.py: LLMConfig
llm:
  provider: "OpenAI"
  model: "gpt-4o-mini" # DeepSeek-V3
