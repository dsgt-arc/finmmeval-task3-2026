# DS@GT StockTron Configuration
exp_name: "cost_check"

# Trading settings
cashflow: 100000
tickers:
  - TSLA
  - BTC
portfolio_mode: market_timing # risk_managed (paper portfolio), market_timing (pure signal implementation)
enriched_memory: false # whether to consider past hit-rate in market_timing or not


# Workflow execution mode
sequential_mode: false  # false for parallel, true for sequential execution

# Analysts to run, refer to graph.constants.py
workflow_analysts:
  - technical
  - company_news
  - company_news_enhanced
  - ml_model_agent_online
  - section_news

# LLM model settings, refer to llm/inference.py: LLMConfig
llm:
  provider: "OpenAI"
  model: "gpt-5.5" # DeepSeek-V3
  temperature: 0
